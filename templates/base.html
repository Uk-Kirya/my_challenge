<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Мой Челлендж</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Play:wght@400;700&display=swap" rel="stylesheet">

  <style>
    /* ── palette ─────────────────────────────────── */
    :root {
      --brand:       #00e5a0;
      --brand-dim:   #00b87a;
      --brand-glow:  rgba(0,229,160,.18);
      --surface:     #0f1117;
      --surface-1:   #161b27;
      --surface-2:   #1e2536;
      --border:      rgba(255,255,255,.07);
      --text-muted:  #8b95a8;
    }

    /* ── base ────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: "Play", sans-serif;
      background: var(--surface);
      color: #dde3ef;
      min-height: 100vh;
    }

    h1, h2, h3, h4, .display-font {
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: .04em;
    }

    /* ── navbar ──────────────────────────────────── */
    .navbar {
      background: rgba(15,17,23,.92) !important;
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .navbar-brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: .1em;
      color: var(--brand) !important;
    }
    .navbar-brand span { color: #fff; }

    /* ── cards ───────────────────────────────────── */
    .card {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: 16px;
    }
    .card:hover { border-color: rgba(0,229,160,.25); }

    /* ── brand button ────────────────────────────── */
    .btn-brand {
      background: var(--brand);
      color: #0a0f0d;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      transition: background .2s, box-shadow .2s;
    }
    .btn-brand:hover {
      background: var(--brand-dim);
      box-shadow: 0 0 18px var(--brand-glow);
      color: #0a0f0d;
    }

    /* ── progress bar ────────────────────────────── */
    .progress {
      background: var(--surface-2);
      border-radius: 99px;
      overflow: visible;
    }
    .progress-bar-brand {
      background: linear-gradient(90deg, var(--brand-dim), var(--brand));
      border-radius: 99px;
      box-shadow: 0 0 10px var(--brand-glow);
      transition: width .6s cubic-bezier(.4,0,.2,1);
      position: relative;
    }
    .progress-bar-brand::after {
      content: '';
      position: absolute;
      right: -1px; top: 50%;
      transform: translateY(-50%);
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--brand);
      box-shadow: 0 0 8px var(--brand);
    }

    /* ── stat badge ──────────────────────────────── */
    .stat-box {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1.25rem;
      text-align: center;
    }
    .stat-box .number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      line-height: 1;
      color: var(--brand);
    }
    .stat-box .label {
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--text-muted);
      margin-top: .25rem;
    }

    /* ── day grid ────────────────────────────────── */
    .day-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
      gap: 6px;
    }
    .day-cell {
      aspect-ratio: 1;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .7rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: default;
      transition: transform .15s, box-shadow .15s;
      position: relative;
    }
    .day-cell.done {
      background: var(--brand-glow);
      border-color: var(--brand);
      color: var(--brand);
    }
    .day-cell.today {
      border-color: #fff;
      color: #fff;
      box-shadow: 0 0 0 2px rgba(255,255,255,.15);
    }
    .day-cell.done.today {
      border-color: var(--brand);
      box-shadow: 0 0 12px var(--brand-glow);
    }
    .day-cell:hover { transform: scale(1.08); }

    /* ── form inputs ─────────────────────────────── */
    .form-control, .form-select {
      background: var(--surface-2) !important;
      border: 1px solid var(--border) !important;
      color: #dde3ef !important;
      border-radius: 10px !important;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--brand) !important;
      box-shadow: 0 0 0 3px var(--brand-glow) !important;
    }
    .form-label {
      font-size: .8rem;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text-muted);
      margin-bottom: .4rem;
    }

    /* ── badge ───────────────────────────────────── */
    .badge-brand {
      background: var(--brand-glow);
      color: var(--brand);
      border: 1px solid var(--brand);
      border-radius: 99px;
      padding: .3em .8em;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    /* ── streak fire ─────────────────────────────── */
    .streak-badge {
      background: linear-gradient(135deg, #ff6b35, #ff3d00);
      color: #fff;
      border-radius: 99px;
      padding: .3em 1em;
      font-size: .8rem;
      font-weight: 700;
    }

    /* ── section title ───────────────────────────── */
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: .1em;
      color: var(--text-muted);
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      padding-bottom: .5rem;
      margin-bottom: 1rem;
    }

    /* ── empty state ─────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 5rem 1rem;
    }
    .empty-state .icon {
      font-size: 4rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      opacity: .4;
    }

    /* ── animations ──────────────────────────────── */
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .fade-up { animation: fadeUp .45s ease both; }
    .fade-up-1 { animation-delay: .1s; }
    .fade-up-2 { animation-delay: .2s; }
    .fade-up-3 { animation-delay: .3s; }

    /* ── scrollbar ───────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 99px; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand" href="/">МОЙ<span>ЧЕЛЛЕНДЖ</span></a>
    <div class="ms-auto">
      <a href="/create" class="btn btn-brand px-4">
        <i class="bi bi-plus-lg me-1"></i> Новый челлендж
      </a>
    </div>
  </div>
</nav>

<main class="container py-5">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
